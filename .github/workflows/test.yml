name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  test-macos:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test (Debug)
        run: swift test

      # Release run guards against optimization-only regressions (e.g. generic
      # `#Predicate` miscompiles) that the Debug suite passes through silently.
      - name: Test (Release)
        run: swift test -c release
